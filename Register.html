<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - CINEC Campus Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
         :root {
            --primary-dark: #0a2540;
            --primary-blue: #1e4d7b;
            --accent-gold: #d4a574;
            --accent-coral: #e07856;
            --neutral-100: #ffffff;
            --neutral-200: #f5f7fa;
            --neutral-300: #e1e8ed;
            --neutral-700: #2c3e50;
            --font-display: 'Fraunces', serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --shadow-md: 0 4px 16px rgba(10, 37, 64, 0.12);
            --shadow-lg: 0 8px 32px rgba(10, 37, 64, 0.16);
        }
        
        body {
            font-family: var(--font-body);
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-blue) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        
        .registration-container {
            max-width: 800px;
            width: 100%;
            background: var(--neutral-100);
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            position: relative;
            z-index: 1;
            animation: slideUp 0.8s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .reg-header {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-blue));
            color: white;
            padding: 2rem 2rem;
            text-align: center;
            position: relative;
        }
        
        .reg-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), var(--accent-coral), transparent);
        }
        
        .reg-icon {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1rem;
            backdrop-filter: blur(10px);
        }
        
        .reg-header h1 {
            font-family: var(--font-display);
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .reg-header p {
            opacity: 0.9;
            font-size: 1rem;
        }
        
        .reg-form {
            padding: 2rem;
        }
        
        .form-section {
            margin-bottom: 1.5rem;
        }
        
        .section-title {
            font-family: var(--font-display);
            font-size: 1.2rem;
            color: var(--primary-dark);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--accent-gold);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .reg-form {
                padding: 1.5rem;
            }
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            font-weight: 600;
            color: var(--neutral-700);
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
        }
        
        .form-group label .required {
            color: var(--accent-coral);
        }
        
        .form-input {
            padding: 0.7rem 1rem;
            border: 2px solid var(--neutral-300);
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: var(--font-body);
            transition: all 0.3s;
            background: var(--neutral-100);
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.1);
        }
        
        select.form-input {
            cursor: pointer;
        }
        
        .form-note {
            font-size: 0.75rem;
            color: var(--neutral-700);
            opacity: 0.7;
            margin-top: 0.2rem;
        }
        
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            margin: 1rem 0;
            padding: 0.8rem;
            background: var(--neutral-200);
            border-radius: 8px;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 0.2rem;
            cursor: pointer;
            accent-color: var(--accent-gold);
        }
        
        .checkbox-group label {
            flex: 1;
            font-size: 0.85rem;
            color: var(--neutral-700);
            cursor: pointer;
        }
        
        .btn-container {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        .btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            font-family: var(--font-body);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-coral));
            color: white;
            box-shadow: 0 4px 15px rgba(212, 165, 116, 0.3);
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 165, 116, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: var(--neutral-300);
            color: var(--neutral-700);
        }
        
        .btn-secondary:hover {
            background: var(--neutral-700);
            color: white;
        }
        
        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--neutral-300);
            color: var(--neutral-700);
            font-size: 0.9rem;
        }
        
        .login-link a {
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: 600;
        }
        
        .login-link a:hover {
            color: var(--accent-coral);
            text-decoration: underline;
        }
        
        .password-strength {
            margin-top: 0.3rem;
            font-size: 0.75rem;
        }
        
        .strength-bar {
            height: 3px;
            background: var(--neutral-300);
            border-radius: 2px;
            margin-top: 0.2rem;
            overflow: hidden;
        }
        
        .strength-fill {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
            border-radius: 2px;
        }
        
        .strength-weak {
            background: #ef4444;
            width: 33%;
        }
        
        .strength-medium {
            background: #f59e0b;
            width: 66%;
        }
        
        .strength-strong {
            background: #10b981;
            width: 100%;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        .error-message {
            color: #ef4444;
            font-size: 0.75rem;
            margin-top: 0.2rem;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        input.error {
            border-color: #ef4444;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        .toast.success {
            background: #10b981;
        }
        
        .toast.error {
            background: #ef4444;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="registration-container">
        <div class="reg-header">
            <div class="reg-icon">🎓</div>
            <h1>Student Registration</h1>
            <p>Join ORYN Campus Hub Community</p>
        </div>

        <form class="reg-form" id="registrationForm" onsubmit="handleRegistration(event)">
            <!-- Personal Information -->
            <div class="form-section">
                <h2 class="section-title">Personal Information</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name <span class="required">*</span></label>
                        <input type="text" class="form-input" id="firstName" name="firstName" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name <span class="required">*</span></label>
                        <input type="text" class="form-input" id="lastName" name="lastName" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Date of Birth <span class="required">*</span></label>
                        <input type="date" class="form-input" id="dob" name="dob" required>
                    </div>
                    <div class="form-group">
                        <label>Gender <span class="required">*</span></label>
                        <select class="form-input" id="gender" name="gender" required>
                            <option value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address <span class="required">*</span></label>
                    <input type="email" class="form-input" id="email" name="email" required>
                    <div class="error-message" id="emailError">Please enter a valid email address</div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Mobile Number <span class="required">*</span></label>
                        <input type="tel" class="form-input" id="mobile" name="mobile" placeholder="+94 XX XXX XXXX" required>
                    </div>
                    <div class="form-group">
                        <label>NIC Number <span class="required">*</span></label>
                        <input type="text" class="form-input" id="nic" name="nic" placeholder="XXXXXXXXXV or XXXXXXXXXXXX" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Address <span class="required">*</span></label>
                    <input type="text" class="form-input" id="address" name="address" required>
                </div>
            </div>

            <!-- Academic Information -->
            <div class="form-section">
                <h2 class="section-title">Academic Information</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>Index Number <span class="required">*</span></label>
                        <input type="text" class="form-input" id="indexNo" name="indexNo" placeholder="EG/2024/IT/XXXX" required>
                    </div>
                    <div class="form-group">
                        <label>Faculty <span class="required">*</span></label>
                        <select class="form-input" id="faculty" name="faculty" required>
                            <option value="">Select Faculty</option>
                            <option value="Faculty of Computing">Faculty of Computing</option>
                            <option value="Faculty of Engineering">Faculty of Engineering</option>
                            <option value="Faculty of Business">Faculty of Business</option>
                            <option value="Faculty of Medicine">Faculty of Medicine</option>
                            <option value="Faculty of Arts">Faculty of Arts</option>
                            <option value="Faculty of Science">Faculty of Science</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Programme <span class="required">*</span></label>
                        <select class="form-input" id="programme" name="programme" required>
                            <option value="">Select Programme</option>
                            <option value="BSc in Information Technology">BSc (Hons) in Information Technology</option>
                            <option value="BSc in Computer Science">BSc (Hons) in Computer Science</option>
                            <option value="BEng in Software Engineering">BEng (Hons) in Software Engineering</option>
                            <option value="BBA in Business Administration">BBA (Hons) in Business Administration</option>
                            <option value="BSc in Aviation Management">BSc (Hons) in Aviation Management</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Year of Study <span class="required">*</span></label>
                        <select class="form-input" id="yearOfStudy" name="yearOfStudy" required>
                                <option value="">Select Year</option>
                                <option value="1">Year 1</option>
                                <option value="2">Year 2</option>
    <option value="3">Year 3</option>
    <option value="4">Year 4</option>
</select>
                    </div>
                </div>
            </div>

            <!-- Account Information -->
            <div class="form-section">
                <h2 class="section-title">Account Information</h2>
                <div class="form-group">
                    <label>Username <span class="required">*</span></label>
                    <input type="text" class="form-input" id="username" name="username" required>
                    <span class="form-note">This will be used for login</span>
                </div>

                <div class="form-group">
                    <label>Password <span class="required">*</span></label>
                    <input type="password" class="form-input" id="password" name="password" required>
                    <div class="password-strength">
                        <span id="strengthText">Password strength</span>
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                    </div>
                    <span class="form-note">Minimum 6 characters</span>
                </div>

                <div class="form-group">
                    <label>Confirm Password <span class="required">*</span></label>
                    <input type="password" class="form-input" id="confirmPassword" name="confirmPassword" required>
                    <div class="error-message" id="passwordMatchError">Passwords do not match</div>
                </div>
            </div>

            <!-- Terms -->
            <div class="checkbox-group">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">
                    I agree to the <a href="#" style="color: var(--accent-gold);">Terms and Conditions</a>
                    and <a href="#" style="color: var(--accent-gold);">Privacy Policy</a>
                </label>
            </div>

            <!-- Buttons -->
            <div class="btn-container">
                <button type="button" class="btn btn-secondary" onclick="window.location.href='home.html'">Cancel</button>
                <button type="submit" class="btn btn-primary" id="registerBtn">Complete Registration</button>
            </div>

            <div class="login-link">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
        </form>
    </div>

    <script>
        // API Configuration - Update this to your backend URL
        const API_BASE_URL = 'http://localhost:5500/api';

        // Password strength checker
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const strengthText = document.getElementById('strengthText');
        const strengthFill = document.getElementById('strengthFill');
        const passwordMatchError = document.getElementById('passwordMatchError');

        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;
            let strength = 0;

            if (password.length >= 6) strength++;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;

            strengthFill.className = 'strength-fill';
            if (strength === 0) {
                strengthText.textContent = 'Password strength';
            } else if (strength <= 2) {
                strengthFill.classList.add('strength-weak');
                strengthText.textContent = 'Weak password';
            } else if (strength === 3) {
                strengthFill.classList.add('strength-medium');
                strengthText.textContent = 'Medium password';
            } else {
                strengthFill.classList.add('strength-strong');
                strengthText.textContent = 'Strong password';
            }

            if (confirmPasswordInput.value) {
                checkPasswordMatch();
            }
        });

        function checkPasswordMatch() {
            const password = passwordInput.value;
            const confirm = confirmPasswordInput.value;

            if (confirm && password !== confirm) {
                passwordMatchError.classList.add('show');
                confirmPasswordInput.classList.add('error');
                return false;
            } else {
                passwordMatchError.classList.remove('show');
                confirmPasswordInput.classList.remove('error');
                return true;
            }
        }

        confirmPasswordInput.addEventListener('input', checkPasswordMatch);

        function validateEmail(email) {
            const re = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
            return re.test(email);
        }

        function validateMobile(mobile) {
            const re = /^[0-9+\-\s]{10,15}$/;
            return re.test(mobile);
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // Check if server is reachable before registration
        async function checkServerConnection() {
            try {
                const response = await fetch(`${API_BASE_URL}/test`, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                const result = await response.json();
                console.log('Server connection test:', result);
                return result.success || result.dbConnected !== undefined;
            } catch (error) {
                console.error('Server connection failed:', error);
                return false;
            }
        }

        // Registration handler - FIXED to match database columns
        async function handleRegistration(e) {
            e.preventDefault();

            // Get form values
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const fullName = `${firstName} ${lastName}`;
            const email = document.getElementById('email').value.trim();
            const mobile = document.getElementById('mobile').value.trim();
            const nic = document.getElementById('nic').value.trim();
            const address = document.getElementById('address').value.trim();
            const indexNo = document.getElementById('indexNo').value.trim();
            const faculty = document.getElementById('faculty').value;
            const programme = document.getElementById('programme').value;
            const yearOfStudy = document.getElementById('yearOfStudy').value;
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const dob = document.getElementById('dob').value;
            const gender = document.getElementById('gender').value;
            const terms = document.getElementById('terms').checked;

            // Validations
            if (!firstName || !lastName || !email || !mobile || !nic || !address ||
                !indexNo || !faculty || !programme || !yearOfStudy || !username || !password || !dob || !gender) {
                showToast('Please fill in all required fields', 'error');
                return;
            }

            if (!validateEmail(email)) {
                showToast('Please enter a valid email address', 'error');
                return;
            }

            if (!validateMobile(mobile)) {
                showToast('Please enter a valid mobile number (10-15 digits)', 'error');
                return;
            }

            if (password.length < 6) {
                showToast('Password must be at least 6 characters long', 'error');
                return;
            }

            if (!checkPasswordMatch()) {
                showToast('Passwords do not match', 'error');
                return;
            }

            if (!terms) {
                showToast('Please accept the terms and conditions', 'error');
                return;
            }

            const registerBtn = document.getElementById('registerBtn');
            const originalText = registerBtn.innerHTML;
            registerBtn.innerHTML = '<span class="loading-spinner"></span> Registering...';
            registerBtn.disabled = true;

            // First check server connection
            const isServerConnected = await checkServerConnection();
            if (!isServerConnected) {
                showToast('Cannot connect to server. Please make sure the backend is running on port 5500.', 'error');
                registerBtn.innerHTML = originalText;
                registerBtn.disabled = false;
                return;
            }

            // Prepare data matching backend expectations
            const registrationData = {
                fullName: fullName,
                indexNo: indexNo,
                password: password,
                email: email,
                mobile: mobile,
                nic: nic,
                address: address,
                faculty: faculty,
                programme: programme,
                year: yearOfStudy, // Backend expects 'year'
                username: username,
                dob: dob,
                gender: gender
            };

            console.log('Sending registration data:', registrationData);

            try {
                const response = await fetch(`${API_BASE_URL}/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(registrationData)
                });

                const result = await response.json();

                if (result.success) {
                    showToast(`✅ Registration Successful! Welcome ${firstName}!`, 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    let errorMessage = result.message || 'Registration failed. Please try again.';

                    // Provide more helpful error messages
                    if (errorMessage.includes('Index number already registered')) {
                        errorMessage = 'This index number is already registered. Please contact the admin.';
                    } else if (errorMessage.includes('Username already taken')) {
                        errorMessage = 'Username already taken. Please choose a different username.';
                    } else if (errorMessage.includes('Email already registered')) {
                        errorMessage = 'Email already registered. Please use a different email.';
                    }

                    showToast(`❌ ${errorMessage}`, 'error');
                }
            } catch (error) {
                console.error('Registration error:', error);
                showToast('Cannot connect to server. Please make sure the backend is running on port 5500.', 'error');
            } finally {
                registerBtn.innerHTML = originalText;
                registerBtn.disabled = false;
            }
        }

        // Auto-format functions
        const indexNoInput = document.getElementById('indexNo');
        if (indexNoInput) {
            indexNoInput.addEventListener('input', function(e) {
                e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9\/]/g, '');
            });
        }

        const nicInput = document.getElementById('nic');
        if (nicInput) {
            nicInput.addEventListener('input', function(e) {
                e.target.value = e.target.value.toUpperCase().replace(/[^0-9VX]/g, '');
            });
        }

        const mobileInput = document.getElementById('mobile');
        if (mobileInput) {
            mobileInput.addEventListener('input', function(e) {
                e.target.value = e.target.value.replace(/[^0-9+\s]/g, '');
            });
        }

        // Set default date of birth max to 18 years ago
        const dobInput = document.getElementById('dob');
        if (dobInput) {
            const today = new Date();
            const eighteenYearsAgo = new Date(today.getFullYear() - 18, today.getMonth(), today.getDate());
            dobInput.max = eighteenYearsAgo.toISOString().split('T')[0];
        }

        // Test connection on page load
        window.addEventListener('load', async() => {
            const connected = await checkServerConnection();
            if (connected) {
                console.log('✅ Server is reachable');
            } else {
                console.warn('⚠️ Server is not reachable. Make sure backend is running on port 5500');
                showToast('⚠️ Server connection failed. Please ensure backend is running on port 5500', 'error');
            }
        });
